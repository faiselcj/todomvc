version: 0.2

phases:
  pre_build:
    commands:
      - aws --version
      - ACCOUNT_ID=093359840674
      - REGION=us-east-1
      - REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/react-app
      - IMAGE_TAG=$CODEBUILD_BUILD_NUMBER
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $REPOSITORY_URI

  build:
    commands:
      - docker build -t react-app .
      - docker tag react-app:latest $REPOSITORY_URI:$IMAGE_TAG
      - docker tag react-app:latest $REPOSITORY_URI:latest

  post_build:
    commands:
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      - printf '[{"name":"react-app","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
